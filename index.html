<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lens & Listen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #14141c; --surface2: #1e1e2e;
    --accent: #7c6cfc; --accent2: #a78bfa; --text: #f0eeff;
    --muted: #6b6886; --success: #4ade80; --danger: #f87171; --radius: 18px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }
  .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; padding: max(env(safe-area-inset-top), 28px) 20px max(env(safe-area-inset-bottom), 16px); gap: 12px; }
  .screen.active { display: flex; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; background: linear-gradient(135deg, var(--text), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .pill-btn { background: var(--surface2); border: none; color: var(--muted); font-size: 13px; font-family: inherit; padding: 7px 14px; border-radius: 20px; cursor: pointer; display: none; }
  .pill-btn.visible { display: block; }
  .pill-btn:active { background: var(--surface); }

  /* PREVIEW */
  .preview-wrap { flex: 1; min-height: 0; border-radius: var(--radius); overflow: hidden; position: relative; background: var(--surface); border: 1.5px solid #ffffff08; }
  .idle-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px; }
  .idle-icon { font-size: 52px; opacity: 0.2; }
  .idle-label { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.6; }
  .preview-img { width: 100%; height: 100%; object-fit: contain; display: none; }
  .preview-img.visible { display: block; }
  .scanning-overlay { position: absolute; inset: 0; background: rgba(10,10,15,0.75); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .scanning-overlay.visible { display: flex; }
  .spinner { width: 44px; height: 44px; border: 3px solid #ffffff15; border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scanning-label { font-size: 14px; color: var(--accent2); font-weight: 500; }

  /* RESULT */
  .result-panel { background: var(--surface); border-radius: var(--radius); border: 1.5px solid #ffffff08; padding: 14px; display: none; flex-direction: column; gap: 10px; max-height: 24vh; flex-shrink: 0; }
  .result-panel.visible { display: flex; }
  .result-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .result-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .copy-btn { background: none; border: none; color: var(--accent2); font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
  .copy-btn:active { background: var(--surface2); }
  .result-text { font-size: 15px; line-height: 1.7; color: var(--text); overflow-y: auto; flex: 1; min-height: 0; font-weight: 300; -webkit-overflow-scrolling: touch; }
  .result-text .word { cursor: pointer; border-radius: 3px; padding: 0 1px; }
  .result-text .word.active { background: #3a2f80; color: #c9bcfe; }

  /* PLAYBACK */
  .playback-panel { background: var(--surface); border-radius: var(--radius); border: 1.5px solid #ffffff08; padding: 14px 16px; display: none; flex-direction: column; gap: 12px; flex-shrink: 0; }
  .playback-panel.visible { display: flex; }
  .progress-wrap { display: flex; flex-direction: column; gap: 6px; }
  .progress-times { display: flex; justify-content: space-between; }
  .progress-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .progress-bar-track { width: 100%; height: 28px; display: flex; align-items: center; position: relative; cursor: pointer; touch-action: none; }
  .progress-bar-bg { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; position: relative; }
  .progress-bar-fill { height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; position: absolute; left: 0; top: 0; pointer-events: none; }
  .progress-thumb { width: 18px; height: 18px; background: var(--accent2); border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); left: 0%; box-shadow: 0 0 8px rgba(167,139,250,0.7), 0 2px 4px rgba(0,0,0,0.3); transition: transform 0.1s; }
  .progress-thumb.dragging { transform: translate(-50%, -50%) scale(1.3); }

  .transport { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .skip-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 6px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .skip-btn:active { color: var(--text); background: var(--surface2); }
  .play-btn { width: 54px; height: 54px; background: linear-gradient(135deg, var(--accent), #6d5cf6); border: none; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(124,108,252,0.4); }
  .play-btn:active { transform: scale(0.93); }

  .settings-row { display: flex; gap: 8px; }
  .setting-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .setting-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; }
  .speed-chips { display: flex; gap: 5px; }
  .speed-chip { flex: 1; background: var(--surface2); border: 1.5px solid #ffffff08; border-radius: 8px; color: var(--muted); font-size: 12px; font-family: inherit; font-weight: 500; padding: 7px 4px; cursor: pointer; text-align: center; }
  .speed-chip.active { background: #2a1f5c; border-color: var(--accent); color: var(--accent2); }
  .speed-chip:active { transform: scale(0.95); }
  .setting-select { background: var(--surface2); border: 1.5px solid #ffffff10; border-radius: 10px; color: var(--text); font-size: 13px; font-family: inherit; padding: 8px 10px; outline: none; -webkit-appearance: none; width: 100%; cursor: pointer; }
  .translate-note { font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* ACTIONS */
  .actions { display: flex; gap: 10px; flex-shrink: 0; }
  .btn-camera { flex: 1; background: linear-gradient(135deg, var(--accent), #6d5cf6); color: #fff; border: none; border-radius: 16px; font-size: 16px; font-family: inherit; font-weight: 600; padding: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 28px rgba(124,108,252,0.35); }
  .btn-camera:active { transform: scale(0.97); }

  /* SHEET */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 50; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
  .sheet-overlay.visible { display: flex; }
  .sheet { width: 100%; background: var(--surface2); border-radius: 24px 24px 0 0; padding: 12px 16px max(env(safe-area-inset-bottom), 24px); display: flex; flex-direction: column; gap: 10px; }
  .sheet-handle { width: 36px; height: 4px; background: #ffffff20; border-radius: 2px; margin: 0 auto 8px; }
  .sheet-title { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 4px; font-weight: 500; }
  .sheet-btn { background: var(--surface); border: 1.5px solid #ffffff08; border-radius: 14px; color: var(--text); font-size: 16px; font-family: inherit; font-weight: 500; padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
  .sheet-btn:active { background: #2a2a3e; }
  .sheet-btn-icon { font-size: 22px; }
  .sheet-cancel { background: var(--surface); border: none; border-radius: 14px; color: var(--danger); font-size: 16px; font-family: inherit; font-weight: 600; padding: 16px; cursor: pointer; margin-top: 4px; }

  .hidden-input { display: none; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; border: 1px solid #ffffff10; z-index: 99; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="screen active" id="mainScreen">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">👁</div>
      <span class="logo-text">Lens & Listen</span>
    </div>
    <div class="header-actions">
      <button class="pill-btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="idle-screen" id="idleScreen">
      <div class="idle-icon">📷</div>
      <div class="idle-label">Tap <strong>Scan Text</strong> to take a photo or pick from your library — text will be read aloud automatically.</div>
    </div>
    <img class="preview-img" id="previewImg" alt="Captured" />
    <div class="scanning-overlay" id="scanningOverlay">
      <div class="spinner"></div>
      <div class="scanning-label" id="scanningLabel">Reading text…</div>
    </div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <span class="result-label">Extracted Text</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="result-text" id="resultText"></div>
  </div>

  <div class="playback-panel" id="playbackPanel">
    <div class="progress-wrap">
      <div class="progress-bar-track" id="progressTrack">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="progress-times">
        <span class="progress-time" id="timeCurrent">0:00</span>
        <span class="progress-time" id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="transport">
      <button class="skip-btn" id="skipBackBtn">⏪</button>
      <button class="skip-btn" id="restartBtn">⏮</button>
      <button class="play-btn" id="playBtn">▶️</button>
      <button class="skip-btn" id="skipFwdBtn">⏩</button>
      <button class="skip-btn" id="skipEndBtn">⏭</button>
    </div>

    <div class="settings-row">
      <div class="setting-group">
        <div class="setting-label">Speed</div>
        <div class="speed-chips" id="speedChips">
          <button class="speed-chip" data-rate="0.6">0.6×</button>
          <button class="speed-chip" data-rate="0.8">0.8×</button>
          <button class="speed-chip active" data-rate="1">1×</button>
          <button class="speed-chip" data-rate="1.3">1.3×</button>
          <button class="speed-chip" data-rate="1.6">1.6×</button>
        </div>
      </div>
    </div>
    <div class="settings-row">
      <div class="setting-group">
        <div class="setting-label">Speak In</div>
        <select class="setting-select" id="languageSelect">
          <option value="original">Original language (as written)</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="zh">Chinese (Mandarin)</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="ru">Russian</option>
          <option value="vi">Vietnamese</option>
          <option value="tl">Tagalog</option>
        </select>
      </div>
    </div>
    <div class="settings-row">
      <div class="setting-group">
        <div class="setting-label">Voice</div>
        <select class="setting-select" id="voiceSelect"></select>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-camera" id="cameraBtn">📷 Scan Text</button>
  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Choose Image Source</div>
    <button class="sheet-btn" id="takePhotoBtn"><span class="sheet-btn-icon">📷</span><span>Take Photo</span></button>
    <button class="sheet-btn" id="chooseLibraryBtn"><span class="sheet-btn-icon">🖼️</span><span>Choose from Library</span></button>
    <button class="sheet-btn" id="chooseFileBtn"><span class="sheet-btn-icon">📁</span><span>Choose File / Screenshot</span></button>
    <button class="sheet-cancel" id="sheetCancelBtn">Cancel</button>
  </div>
</div>

<input type="file" accept="image/*" capture="environment" class="hidden-input" id="cameraInput" />
<input type="file" accept="image/*" class="hidden-input" id="libraryInput" />
<input type="file" accept="image/*" class="hidden-input" id="filePickerInput" />
<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const WORKER_URL = 'https://photo-reader-n60m.onrender.com';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let extractedText = '';      // original extracted text (always shown in result panel)
let speakText = '';          // text actually being spoken (may be translated)
let sentences = [];
let currentSentence = 0;
let speaking = false;
let speechRate = 1;
let estimatedDuration = 0;
let elapsed = 0;
let timerInterval = null;
let isDragging = false;
let targetLanguage = 'original';

// ── Voices ──
const LANG_LOCALE_MAP = {
  en: 'en', es: 'es', fr: 'fr', de: 'de', it: 'it', pt: 'pt',
  zh: 'zh', ja: 'ja', ko: 'ko', ar: 'ar', hi: 'hi', ru: 'ru', vi: 'vi', tl: 'tl,fil'
};

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  populateVoiceList();
}

function populateVoiceList() {
  const voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  const prev = sel.value;
  sel.innerHTML = '';

  let filtered = voices;
  if (targetLanguage !== 'original') {
    const codes = LANG_LOCALE_MAP[targetLanguage].split(',');
    filtered = voices.filter(v => codes.some(c => v.lang.toLowerCase().startsWith(c)));
    if (!filtered.length) filtered = voices; // fallback to all if none found
  }

  const seen = new Set();
  const grouped = {};
  filtered.forEach(v => {
    const key = v.lang + '|' + v.name;
    if (seen.has(key)) return;
    seen.add(key);
    if (!grouped[v.lang]) grouped[v.lang] = [];
    grouped[v.lang].push(v);
  });

  const langs = Object.keys(grouped).sort((a, b) => {
    if (a.startsWith('en')) return -1;
    if (b.startsWith('en')) return 1;
    return a.localeCompare(b);
  });

  langs.forEach(lang => {
    const grp = document.createElement('optgroup');
    grp.label = lang;
    grouped[lang].forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = v.name.replace(/\(.*?\)/g, '').trim();
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });

  if (prev && [...sel.options].find(o => o.value === prev)) {
    sel.value = prev;
  } else if (sel.options.length) {
    sel.selectedIndex = 0;
  }
}

if (typeof speechSynthesis !== 'undefined') {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

document.getElementById('languageSelect').addEventListener('change', async (e) => {
  targetLanguage = e.target.value;
  populateVoiceList();
  if (!extractedText) return;
  await prepareSpeechText();
  if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(0), 100); }
});

document.getElementById('voiceSelect').addEventListener('change', () => {
  if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(currentSentence), 100); }
});

// ── Sheet ──
function openSheet() { document.getElementById('sheetOverlay').classList.add('visible'); }
function closeSheet() { document.getElementById('sheetOverlay').classList.remove('visible'); }
document.getElementById('cameraBtn').addEventListener('click', openSheet);
document.getElementById('sheetOverlay').addEventListener('click', e => { if (e.target === document.getElementById('sheetOverlay')) closeSheet(); });
document.getElementById('sheetCancelBtn').addEventListener('click', closeSheet);
document.getElementById('takePhotoBtn').addEventListener('click', () => { closeSheet(); document.getElementById('cameraInput').click(); });
document.getElementById('chooseLibraryBtn').addEventListener('click', () => { closeSheet(); document.getElementById('libraryInput').click(); });
document.getElementById('chooseFileBtn').addEventListener('click', () => { closeSheet(); document.getElementById('filePickerInput').click(); });
['cameraInput','libraryInput','filePickerInput'].forEach(id => {
  document.getElementById(id).addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    await processImage(file); e.target.value = '';
  });
});

// ── Image processing ──
async function processImage(file) {
  const url = URL.createObjectURL(file);
  const img = document.getElementById('previewImg');
  img.src = url; img.classList.add('visible');
  document.getElementById('idleScreen').style.display = 'none';
  document.getElementById('scanningLabel').textContent = 'Reading text…';
  document.getElementById('scanningOverlay').classList.add('visible');
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('playbackPanel').classList.remove('visible');
  document.getElementById('clearBtn').classList.add('visible');
  stopSpeaking();

  try {
    const base64 = await toBase64(file);
    const text = await extractText(base64, file.type || 'image/jpeg');
    extractedText = text;
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultPanel').classList.add('visible');
    document.getElementById('playbackPanel').classList.add('visible');

    await prepareSpeechText();

    currentSentence = 0; elapsed = 0;
    updatePlayBtn(false);
    estimateDuration();
    updateProgress(0);
    speakFrom(0);
  } catch(err) {
    showToast('⚠️ ' + (err.message || 'Something went wrong'));
  } finally {
    document.getElementById('scanningOverlay').classList.remove('visible');
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file);
  });
}

async function extractText(base64, mediaType) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 1000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: 'Extract ALL visible text from this image exactly as it appears. Return only the raw text, no commentary, no markdown. If there is no text, say: (No text found)' }
      ]}]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Error ${res.status}`);
  }
  const data = await res.json();
  return data.content.map(b => b.text || '').join('').trim();
}

const LANG_NAMES = {
  en: 'English', es: 'Spanish', fr: 'French', de: 'German', it: 'Italian',
  pt: 'Portuguese', zh: 'Mandarin Chinese', ja: 'Japanese', ko: 'Korean',
  ar: 'Arabic', hi: 'Hindi', ru: 'Russian', vi: 'Vietnamese', tl: 'Tagalog'
};

async function translateText(text, langCode) {
  const langName = LANG_NAMES[langCode] || langCode;
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 2000,
      messages: [{ role: 'user', content: [
        { type: 'text', text: `Translate the following text into ${langName}. Return ONLY the translated text with no commentary, no notes, no original text included:\n\n${text}` }
      ]}]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Translation error ${res.status}`);
  }
  const data = await res.json();
  return data.content.map(b => b.text || '').join('').trim();
}

async function prepareSpeechText() {
  if (targetLanguage === 'original' || !extractedText || extractedText === '(No text found)') {
    speakText = extractedText;
    sentences = splitSentences(speakText);
    return;
  }
  document.getElementById('idleScreen').style.display = 'none';
  document.getElementById('previewImg').classList.add('visible');
  document.getElementById('scanningLabel').textContent = `Translating to ${LANG_NAMES[targetLanguage]}…`;
  document.getElementById('scanningOverlay').classList.add('visible');
  try {
    speakText = await translateText(extractedText, targetLanguage);
  } catch (err) {
    showToast('⚠️ Translation failed, using original text');
    speakText = extractedText;
  } finally {
    document.getElementById('scanningOverlay').classList.remove('visible');
  }
  sentences = splitSentences(speakText);
}

// ── Sentence splitting (handles CJK punctuation too) ──
function splitSentences(text) {
  const parts = text.match(/[^.!?。！？\n]+[.!?。！？\n]*/g) || [text];
  return parts.map(s => s.trim()).filter(Boolean);
}

// ── Duration estimation ──
function estimateDuration() {
  const wordCount = (speakText || extractedText).split(/\s+/).length;
  const wpm = 150 * speechRate;
  estimatedDuration = Math.max(1, Math.round((wordCount / wpm) * 60));
  document.getElementById('timeTotal').textContent = formatTime(estimatedDuration);
}

function formatTime(s) { return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

function updateProgress(f) {
  f = Math.max(0, Math.min(1, f));
  document.getElementById('progressFill').style.width = (f*100)+'%';
  document.getElementById('progressThumb').style.left = (f*100)+'%';
  document.getElementById('timeCurrent').textContent = formatTime(f * estimatedDuration);
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (isDragging) return;
    elapsed = Math.min(elapsed + 0.25, estimatedDuration);
    updateProgress(elapsed / estimatedDuration);
  }, 250);
}
function stopTimer() { clearInterval(timerInterval); }

// ── Draggable scrub bar (mouse + touch) ──
const track = document.getElementById('progressTrack');
const thumb = document.getElementById('progressThumb');

function fractionFromEvent(e) {
  const rect = track.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function scrubTo(fraction, commit) {
  elapsed = fraction * estimatedDuration;
  updateProgress(fraction);
  if (commit) {
    const target = Math.min(sentences.length - 1, Math.floor(fraction * sentences.length));
    if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(target), 80); }
    else { currentSentence = target; }
  }
}

function dragStart(e) {
  isDragging = true;
  thumb.classList.add('dragging');
  scrubTo(fractionFromEvent(e), false);
  e.preventDefault();
}
function dragMove(e) {
  if (!isDragging) return;
  scrubTo(fractionFromEvent(e), false);
  e.preventDefault();
}
function dragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  thumb.classList.remove('dragging');
  const f = elapsed / estimatedDuration;
  scrubTo(f, true);
}

track.addEventListener('mousedown', dragStart);
window.addEventListener('mousemove', dragMove);
window.addEventListener('mouseup', dragEnd);
track.addEventListener('touchstart', dragStart, { passive: false });
window.addEventListener('touchmove', dragMove, { passive: false });
window.addEventListener('touchend', dragEnd);

// ── Speech ──
function getVoice() {
  const name = document.getElementById('voiceSelect').value;
  return speechSynthesis.getVoices().find(v => v.name === name) || null;
}
function speakFrom(index) {
  if (!sentences.length) return;
  index = Math.max(0, Math.min(sentences.length - 1, index));
  stopSpeaking(true); currentSentence = index; speakNext();
}
function speakNext() {
  if (currentSentence >= sentences.length) { speaking = false; updatePlayBtn(false); stopTimer(); updateProgress(1); return; }
  const u = new SpeechSynthesisUtterance(sentences[currentSentence]);
  u.rate = speechRate;
  const voice = getVoice(); if (voice) { u.voice = voice; u.lang = voice.lang; }
  u.onstart = () => { speaking = true; updatePlayBtn(true); startTimer(); };
  u.onend = () => { currentSentence++; speakNext(); };
  u.onerror = e => { if (e.error !== 'interrupted') { speaking = false; updatePlayBtn(false); stopTimer(); } };
  speechSynthesis.speak(u);
}
function stopSpeaking(silent = false) {
  speechSynthesis?.cancel(); speaking = false; stopTimer();
  if (!silent) updatePlayBtn(false);
}
function updatePlayBtn(isPlaying) { document.getElementById('playBtn').textContent = isPlaying ? '⏸️' : '▶️'; }

// Transport
document.getElementById('playBtn').addEventListener('click', () => { speaking ? stopSpeaking() : speakFrom(currentSentence); });
document.getElementById('restartBtn').addEventListener('click', () => { elapsed=0; currentSentence=0; updateProgress(0); stopSpeaking(); setTimeout(() => speakFrom(0), 80); });
document.getElementById('skipBackBtn').addEventListener('click', () => {
  const t = Math.max(0, currentSentence-2); elapsed = Math.max(0, elapsed-10); updateProgress(elapsed/estimatedDuration);
  if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(t), 80); } else { currentSentence=t; }
});
document.getElementById('skipFwdBtn').addEventListener('click', () => {
  const t = Math.min(sentences.length-1, currentSentence+2); elapsed = Math.min(estimatedDuration, elapsed+10); updateProgress(elapsed/estimatedDuration);
  if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(t), 80); } else { currentSentence=t; }
});
document.getElementById('skipEndBtn').addEventListener('click', () => { stopSpeaking(); elapsed=estimatedDuration; updateProgress(1); currentSentence=sentences.length; });

// Speed
document.getElementById('speedChips').addEventListener('click', e => {
  const chip = e.target.closest('.speed-chip'); if (!chip) return;
  document.querySelectorAll('.speed-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active'); speechRate = parseFloat(chip.dataset.rate);
  estimateDuration();
  if (speaking) { stopSpeaking(); setTimeout(() => speakFrom(currentSentence), 80); }
});

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  stopSpeaking(); extractedText=''; speakText=''; sentences=[]; currentSentence=0; elapsed=0;
  const img = document.getElementById('previewImg'); img.src=''; img.classList.remove('visible');
  document.getElementById('idleScreen').style.display='';
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('playbackPanel').classList.remove('visible');
  document.getElementById('clearBtn').classList.remove('visible');
  updateProgress(0);
});

// Copy
document.getElementById('copyBtn').addEventListener('click', async () => {
  if (!extractedText) return;
  try { await navigator.clipboard.writeText(extractedText); showToast('✓ Copied!'); }
  catch { showToast('Long-press text to copy'); }
});

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
